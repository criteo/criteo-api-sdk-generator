name: Test Java Generator

on:
  pull_request:
    paths:
      - 'generator/java/**'
      - 'api-specifications/**'
  push:
    branches:
      - 'update-oas-**'    
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, github-app-registered]

    steps:
      - uses: actions/checkout@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 1.8
        uses: actions/setup-java@v5
        with:
          java-version: 8
          distribution: temurin

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Generate SDKs
        run: ./gradlew :generator:java:generateClient
        shell: bash

      - name: testGT what is JAVA_HOME
        run: echo $JAVA_HOME

      - name: testGT where is java
        run: which java

      - name: testGT what is JAVA_HOME for bash
        run: echo $JAVA_HOME
        shell: bash

      - name: testGT where is java for bash
        run: which java
        shell: bash

      - name: Test SDKs
        run: python ./scripts/test_sdk.py --language java
        shell: bash
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
